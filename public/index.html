<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Absolute Humidity Advisor</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen p-4 md:p-8">

    <div class="max-w-5xl mx-auto">
        <header class="mb-8 border-b border-slate-800 pb-4 flex justify-between items-center">
            <div>
                <h1 class="text-3xl font-black text-cyan-400">Absolute Humidity Advisor</h1>
            </div>
            <button onclick="refreshAllData()" class="bg-slate-800 hover:bg-slate-700 px-4 py-2 rounded-lg text-sm font-semibold transition border border-slate-700">
                Refresh
            </button>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="bg-slate-800 rounded-2xl border border-slate-700 p-6 h-fit order-2 lg:order-1">
                <h2 class="text-lg font-bold text-slate-200 mb-4">Add T & H Sensor</h2>
                <div class="space-y-4">
                    <div>
                        <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1">Device ID</label>
                        <input id="devId" type="text" placeholder="e.g. bf6b78..." class="w-full px-3 py-2 bg-slate-900 border border-slate-700 rounded-lg text-sm focus:outline-none focus:border-cyan-400">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1">Location Name</label>
                        <input id="devName" type="text" placeholder="e.g. Living Room, Outdoor" class="w-full px-3 py-2 bg-slate-900 border border-slate-700 rounded-lg text-sm focus:outline-none focus:border-cyan-400">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1">Type</label>
                        <select id="devType" class="w-full px-3 py-2 bg-slate-900 border border-slate-700 rounded-lg text-sm focus:outline-none focus:border-cyan-400">
                            <option value="indoor">🏠 Indoor Sensor</option>
                            <option value="outdoor">🌳 Outdoor Sensor</option>
                        </select>
                    </div>
                    <button onclick="addDevice()" class="w-full bg-cyan-500 hover:bg-cyan-600 text-slate-900 font-bold py-2 rounded-lg transition text-sm">
                        Add Device
                    </button>
                </div>

                <div class="mt-8">
                    <h3 class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-2">Tracked Devices</h3>
                    <ul id="deviceList" class="space-y-2 text-sm"></ul>
                </div>
            </div>

            <div class="lg:col-span-2 space-y-6 order-1 lg:order-2">
                <div id="outdoorCardContainer">
                    <div id="outdoorCard" class="bg-slate-800/50 border-2 border-dashed border-slate-700 rounded-2xl p-6 text-center text-slate-400">
                        Set up an Outdoor Sensor to begin calculations.
                    </div>
                </div>

                <div>
                    <h2 class="text-xl font-bold mb-4 flex items-center gap-2">Room Analysis</h2>
                    <div id="roomsGrid" class="grid grid-cols-1 gap-4"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let devices = [];
        let sensorDataCache = {};
        
        let plotStates = {}; 

        async function fetchPlotData(id, metric, window) {
            const res = await fetch(`/api/history/${id}?metric=${metric}&window=${window}`);
            return await res.json();
        }

        function closePlot(id) {
            const contentLayer = document.getElementById(`content-${id}`);
            const plotLayer = document.getElementById(`plot-layer-${id}`);
            if (contentLayer && plotLayer) {
                contentLayer.classList.remove('opacity-10');
                plotLayer.classList.replace('opacity-100', 'opacity-0');
                plotLayer.classList.replace('pointer-events-auto', 'pointer-events-none');
            }
        }

        async function togglePlot(id, metric) {
            const state = plotStates[id];
            const contentLayer = document.getElementById(`content-${id}`);
            const plotLayer = document.getElementById(`plot-layer-${id}`);

            if (state && state.metric === metric && plotLayer.classList.contains('opacity-100')) {
                closePlot(id);
                return;
            }

            if (!state) {
                plotStates[id] = { metric, window: '1w', chartInstance: null };
            } else {
                plotStates[id].metric = metric;
            }

            contentLayer.classList.add('opacity-10');
            plotLayer.classList.replace('opacity-0', 'opacity-100');
            plotLayer.classList.replace('pointer-events-none', 'pointer-events-auto');

            await renderChart(id);
        }

        async function cycleTimeframe(id, event) {
            if (event) event.stopPropagation(); 
            
            const state = plotStates[id];
            if (!state) return;

            if (state.window === '1w') state.window = '1mo';
            else if (state.window === '1mo') state.window = '1y';
            else state.window = '1w';

            document.getElementById(`plot-label-${id}`).innerText = state.window.toUpperCase();
            await renderChart(id);
        }

        async function renderChart(id) {
            const state = plotStates[id];
            const canvas = document.getElementById(`canvas-${id}`);
            const dataResult = await fetchPlotData(id, state.metric, state.window);
            const { labels, points } = dataResult.data;

            if (state.chartInstance) {
                state.chartInstance.destroy();
            }

            let color = '#22d3ee'; 
            let title = 'ABSOLUTE HUMIDITY [g/m³]';
            if (state.metric === 'temperature') { color = '#f87171'; title = 'TEMPERATURE [°C]'; }
            if (state.metric === 'humidity') { color = '#a78bfa'; title = 'RELATIVE HUMIDITY [%]'; }

            document.getElementById(`plot-title-${id}`).innerText = title;

            state.chartInstance = new Chart(canvas, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        data: points,
                        borderColor: color,
                        backgroundColor: color + '20',
                        fill: true,
                        tension: 0.3,
                        pointRadius: 3,
                        pointBackgroundColor: '#0f172a',
                        borderWidth: 2
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        x: { 
                            ticks: { color: '#64748b', font: {size: 10} }, 
                            grid: { display: false },
                            border: { display: false } // Hides the solid X-axis spine
                        },
                        y: { 
                            ticks: { color: '#64748b', font: {size: 10} }, 
                            grid: { color: '#334155', borderDash: [5, 5] },
                            border: { display: false } // Hides the solid Y-axis spine causing the artifact
                        }
                    }
                }
            });
        }

        async function fetchDevices() {
            try {
                const res = await fetch('/api/devices');
                const data = await res.json();
                if (data.success) {
                    devices = data.devices;
                    renderDeviceList();
                }
            } catch (e) { console.error("Error fetching device registration matrix", e); }
        }

        async function addDevice() {
            const id = document.getElementById('devId').value.trim();
            const name = document.getElementById('devName').value.trim();
            const type = document.getElementById('devType').value;

            if (!id || !name) return alert('Please fill in all fields');
            
            try {
                const response = await fetch('/api/devices', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ id, name, type })
                });
                const data = await response.json();
                if (!data.success) return alert(data.error);
                
                document.getElementById('devId').value = '';
                document.getElementById('devName').value = '';
                devices = data.devices;
                renderDeviceList();
                refreshAllData();
            } catch (e) {
                alert('Failed to register device to backend pipeline.');
            }
        }

        async function removeDevice(id) {
            try {
                const response = await fetch(`/api/devices/${id}`, { method: 'DELETE' });
                const data = await response.json();
                if (data.success) {
                    devices = data.devices;
                    delete sensorDataCache[id];
                    renderDeviceList();
                    updateDashboardDisplay();
                }
            } catch (e) { console.error("Could not remove device link safely", e); }
        }

        function renderDeviceList() {
            const list = document.getElementById('deviceList');
            list.innerHTML = devices.map((d) => `
                <li class="flex justify-between items-center bg-slate-900 p-2 rounded border border-slate-800">
                    <span class="truncate pr-2"><strong>${d.name}</strong> (${d.type})</span>
                    <button onclick="removeDevice('${d.id}')" class="text-slate-400 hover:text-red-400 font-bold text-xs">Remove</button>
                </li>
            `).join('');
        }

        async function refreshAllData() {
            try {
                const res = await fetch('/api/dashboard');
                const data = await res.json();
                if (data.success) {
                    sensorDataCache = data.cache;
                }
                updateDashboardDisplay();
            } catch (e) { console.error("Error gathering active sync metrics telemetry", e); }
        }

        function getPlotLayerHTML(id) {
            return `
                <div id="plot-layer-${id}" class="absolute inset-0 z-20 opacity-0 pointer-events-none transition-opacity duration-300 bg-slate-900/60 backdrop-blur-[2px] flex flex-col p-4 cursor-pointer" onclick="closePlot('${id}')">
                    <div class="flex justify-between items-center mb-2">
                        <span id="plot-title-${id}" class="text-xs font-bold text-slate-100 drop-shadow-md tracking-wider"></span>
                        <button id="plot-label-${id}" class="text-[10px] font-black text-cyan-400 bg-cyan-950/80 hover:bg-cyan-800 px-3 py-1.5 rounded border border-cyan-700 transition-colors z-30 cursor-pointer shadow-lg" onclick="cycleTimeframe('${id}', event)">1W</button>
                    </div>
                    <div class="relative w-full flex-1 min-h-0">
                        <canvas id="canvas-${id}"></canvas>
                    </div>
                </div>
            `;
        }

        function updateDashboardDisplay() {
            const outdoorDev = devices.find(d => d.type === 'outdoor');
            const outdoorData = outdoorDev ? sensorDataCache[outdoorDev.id] : null;
            const outdoorContainer = document.getElementById('outdoorCardContainer');

            if (outdoorData && outdoorData.absoluteHumidity !== null) {
                outdoorContainer.innerHTML = `
                <div class="relative overflow-hidden bg-gradient-to-br from-slate-800 to-slate-900 border border-cyan-700 rounded-2xl shadow-md min-h-[180px]">
                    <div id="content-${outdoorDev.id}" class="transition-opacity duration-500 z-10 relative p-6 h-full flex flex-col justify-between">
                        <div class="flex justify-between items-start">
                            <div class="flex-1">
                                <div class="flex items-center flex-wrap gap-2">
                                    <span class="bg-cyan-500/10 text-cyan-400 text-xs px-2 py-1 rounded font-bold uppercase tracking-wider">Reference Point</span>
                                    <span class="text-[12px] text-slate-400 font-medium">outside</span>
                                </div>
                                <h2 class="text-2xl font-bold mt-2">${outdoorDev.name}</h2>
                            </div>
                            <div class="text-right cursor-pointer hover:bg-slate-700/50 p-2 -m-2 rounded-xl transition shrink-0" onclick="togglePlot('${outdoorDev.id}', 'absoluteHumidity')">
                                <p class="text-xs text-slate-400 uppercase font-bold tracking-wider mb-1">Absolute Humidity:</p>
                                <p class="text-3xl font-black text-cyan-400">${outdoorData.absoluteHumidity} <span class="text-lg font-normal text-cyan-400">g/m³</span></p>
                            </div>
                        </div>
                        <div class="grid grid-cols-2 gap-4 mt-6 pt-4 border-t border-slate-800 text-center text-sm">
                            <div class="cursor-pointer hover:bg-slate-800 py-2 rounded-lg transition" onclick="togglePlot('${outdoorDev.id}', 'temperature')">
                                <span class="text-slate-400">Temperature:</span> <strong class="text-slate-200">${outdoorData.temperature} °C</strong>
                            </div>
                            <div class="cursor-pointer hover:bg-slate-800 py-2 rounded-lg transition" onclick="togglePlot('${outdoorDev.id}', 'humidity')">
                                <span class="text-slate-400">Relative Humidity:</span> <strong class="text-slate-200">${outdoorData.humidity} %</strong>
                            </div>
                        </div>
                    </div>
                    ${getPlotLayerHTML(outdoorDev.id)}
                </div>`;
            } else {
                outdoorContainer.innerHTML = `
                <div class="bg-slate-800/50 border-2 border-dashed border-slate-700 rounded-2xl p-6 text-center text-slate-400">
                    Set up an Outdoor Sensor to begin comparisons.
                </div>`;
            }

            const roomsGrid = document.getElementById('roomsGrid');
            const indoorDevices = devices.filter(d => d.type === 'indoor');

            if (indoorDevices.length === 0) {
                roomsGrid.innerHTML = `<p class="text-slate-500 text-sm italic">No indoor rooms added yet.</p>`;
                return;
            }

            roomsGrid.innerHTML = indoorDevices.map(dev => {
                const data = sensorDataCache[dev.id];
                if (!data) return `<div class="bg-slate-800 p-6 rounded-2xl border border-slate-700 text-slate-500 text-sm">Loading data for ${dev.name}...</div>`;

                let badgeHtml = '';
                let cardColorClasses = 'bg-gradient-to-br from-slate-800 to-slate-900 border-slate-700';
                let absTextColorClass = 'text-cyan-400';

                if (!outdoorData || outdoorData.absoluteHumidity === null) {
                    badgeHtml = `<span class="bg-slate-500/10 text-slate-400 text-xs px-2 py-1 rounded font-bold uppercase tracking-wider">Awaiting Outdoor Data</span>`;
                } else {
                    const dynamicDiff = (data.absoluteHumidity - outdoorData.absoluteHumidity).toFixed(1);
                    const isHigher = data.absoluteHumidity > outdoorData.absoluteHumidity;

                    if (isHigher) {
                        cardColorClasses = 'bg-gradient-to-br from-slate-800 to-slate-900 border-rose-500/40 shadow-lg shadow-rose-950/20';
                        absTextColorClass = 'text-rose-400';
                        badgeHtml = `
                            <div class="flex items-center flex-wrap gap-2">
                                <span class="bg-rose-500/10 text-rose-400 text-xs px-2 py-1 rounded font-bold uppercase tracking-wider">Open Window</span>
                                <span class="text-[12px] text-slate-400 font-medium">${Math.abs(dynamicDiff)} g/m³ less moisture outside</span>
                            </div>`;
                    } else {
                        cardColorClasses = 'bg-gradient-to-br from-slate-800 to-slate-900 border-emerald-500/40 shadow-lg shadow-emerald-950/20';
                        absTextColorClass = 'text-emerald-400';
                        badgeHtml = `
                            <div class="flex items-center flex-wrap gap-2">
                                <span class="bg-emerald-500/10 text-emerald-400 text-xs px-2 py-1 rounded font-bold uppercase tracking-wider">Close Window</span>
                                <span class="text-[12px] text-slate-400 font-medium">${Math.abs(dynamicDiff)} g/m³ more moisture outside</span>
                            </div>`;
                    }
                }

                return `
                    <div class="relative overflow-hidden border rounded-2xl transition-all duration-300 min-h-[180px] ${cardColorClasses}">
                        <div id="content-${dev.id}" class="transition-opacity duration-500 z-10 relative p-6 h-full flex flex-col justify-between">
                            <div class="flex justify-between items-start gap-4">
                                <div class="flex-1">
                                    ${badgeHtml}
                                    <h2 class="text-2xl font-bold mt-2">${dev.name}</h2>
                                </div>
                                <div class="text-right cursor-pointer hover:bg-slate-700/50 p-2 -m-2 rounded-xl transition shrink-0" onclick="togglePlot('${dev.id}', 'absoluteHumidity')">
                                    <p class="text-xs text-slate-400 uppercase font-bold tracking-wider mb-1">Absolute Humidity:</p>
                                    <p class="text-3xl font-black ${absTextColorClass}">${data.absoluteHumidity ? data.absoluteHumidity : 'N/A'} <span class="text-lg font-normal ${absTextColorClass}">g/m³</span></p>
                                </div>
                            </div>
                            <div class="grid grid-cols-2 gap-4 mt-6 pt-4 border-t border-slate-800 text-center text-sm">
                                <div class="cursor-pointer hover:bg-slate-800 py-2 rounded-lg transition" onclick="togglePlot('${dev.id}', 'temperature')">
                                    <span class="text-slate-400">Temperature:</span> <strong class="text-slate-200">${data.temperature} °C</strong>
                                </div>
                                <div class="cursor-pointer hover:bg-slate-800 py-2 rounded-lg transition" onclick="togglePlot('${dev.id}', 'humidity')">
                                    <span class="text-slate-400">Relative Humidity:</span> <strong class="text-slate-200">${data.humidity} %</strong>
                                </div>
                            </div>
                        </div>
                        ${getPlotLayerHTML(dev.id)}
                    </div>`;
            }).join('');
            
            Object.keys(plotStates).forEach(id => {
                const state = plotStates[id];
                const plotLayer = document.getElementById(`plot-layer-${id}`);
                if (plotLayer && plotLayer.classList.contains('opacity-100')) {
                    renderChart(id);
                }
            });
        }

        async function init() {
            await fetchDevices();
            await refreshAllData();
        }

        init();
        setInterval(refreshAllData, 5 * 60 * 1000); 
    </script>
</body>
</html>
